<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3508" height="2480" viewBox="0 0 3508 2480" role="img" aria-labelledby="title desc">
  <title id="title">Ecomm Analyst Project Architecture</title>
  <desc id="desc">A4 landscape architecture diagram showing frontend, backend, data, and AI integration.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5fbff"/>
      <stop offset="100%" stop-color="#eef8f1"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <marker id="arrow" markerWidth="16" markerHeight="12" refX="14" refY="6" orient="auto">
      <path d="M0,0 L16,6 L0,12 z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="3508" height="2480" fill="url(#bg)"/>

  <text x="1754" y="150" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="88" font-weight="700" fill="#0f172a">
    Ecomm Analyst - System Architecture
  </text>
  <text x="1754" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" fill="#334155">
    A4 Landscape Diagram for PowerPoint
  </text>

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="120" y="1000" width="420" height="180" rx="24" fill="#ffffff" stroke="#94a3b8" stroke-width="4"/>
  </g>
  <text x="330" y="1070" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#1f2937">User</text>
  <text x="330" y="1125" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#334155">Seller / Analyst</text>

  <!-- Frontend Group -->
  <g filter="url(#shadow)">
    <rect x="680" y="520" width="760" height="1120" rx="30" fill="#ffe7d6" stroke="#e07a2f" stroke-width="6"/>
  </g>
  <text x="1060" y="610" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#7c2d12">Frontend (Next.js)</text>

  <rect x="760" y="700" width="600" height="210" rx="20" fill="#fff7f1" stroke="#f59e0b" stroke-width="4"/>
  <text x="1060" y="775" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="600" fill="#7c2d12">Pages</text>
  <text x="1060" y="830" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#9a3412">Dashboard, Sales, Engagement,</text>
  <text x="1060" y="875" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#9a3412">Comments, Insights, Settings</text>

  <rect x="760" y="980" width="600" height="160" rx="20" fill="#fff7f1" stroke="#f59e0b" stroke-width="4"/>
  <text x="1060" y="1075" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="600" fill="#7c2d12">AuthContext</text>

  <rect x="760" y="1210" width="600" height="160" rx="20" fill="#fff7f1" stroke="#f59e0b" stroke-width="4"/>
  <text x="1060" y="1305" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="600" fill="#7c2d12">API Client</text>

  <!-- Backend Group -->
  <g filter="url(#shadow)">
    <rect x="1600" y="300" width="1000" height="1580" rx="30" fill="#def2ff" stroke="#2f6fdb" stroke-width="6"/>
  </g>
  <text x="2100" y="390" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#1e3a8a">Backend (FastAPI)</text>

  <rect x="1700" y="470" width="800" height="170" rx="20" fill="#f1f8ff" stroke="#60a5fa" stroke-width="4"/>
  <text x="2100" y="535" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" fill="#1e40af">main.py</text>
  <text x="2100" y="585" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#1d4ed8">CORS + Router Registration</text>

  <rect x="1700" y="690" width="800" height="180" rx="20" fill="#f1f8ff" stroke="#60a5fa" stroke-width="4"/>
  <text x="2100" y="760" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" fill="#1e40af">Auth Router</text>
  <text x="2100" y="810" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#1d4ed8">register, login, me</text>

  <rect x="1700" y="930" width="800" height="250" rx="20" fill="#f1f8ff" stroke="#60a5fa" stroke-width="4"/>
  <text x="2100" y="1000" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" fill="#1e40af">Feature Routers</text>
  <text x="2100" y="1050" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#1d4ed8">dashboard, products, sales,</text>
  <text x="2100" y="1095" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#1d4ed8">engagement, comments, insights</text>

  <rect x="1700" y="1240" width="380" height="230" rx="20" fill="#f1f8ff" stroke="#60a5fa" stroke-width="4"/>
  <text x="1890" y="1310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="600" fill="#1e40af">Dependencies</text>
  <text x="1890" y="1360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#1d4ed8">JWT validation</text>
  <text x="1890" y="1400" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#1d4ed8">Current user</text>

  <rect x="2120" y="1240" width="380" height="230" rx="20" fill="#f1f8ff" stroke="#60a5fa" stroke-width="4"/>
  <text x="2310" y="1310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="600" fill="#1e40af">Schemas</text>
  <text x="2310" y="1360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#1d4ed8">Request/Response</text>
  <text x="2310" y="1400" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#1d4ed8">Validation</text>

  <!-- Data Layer -->
  <g filter="url(#shadow)">
    <rect x="2720" y="420" width="670" height="1120" rx="30" fill="#e7f7e5" stroke="#2e8b57" stroke-width="6"/>
  </g>
  <text x="3055" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#14532d">Data Layer</text>

  <rect x="2810" y="600" width="490" height="180" rx="20" fill="#f4fff2" stroke="#4ade80" stroke-width="4"/>
  <text x="3055" y="675" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" fill="#166534">SQLAlchemy Models</text>
  <text x="3055" y="725" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#15803d">User, Product, SalesRecord, ...</text>

  <rect x="2810" y="850" width="490" height="180" rx="20" fill="#f4fff2" stroke="#4ade80" stroke-width="4"/>
  <text x="3055" y="930" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" fill="#166534">Database</text>
  <text x="3055" y="980" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#15803d">SQLite (dev) / PostgreSQL (prod)</text>

  <rect x="2810" y="1100" width="490" height="180" rx="20" fill="#f4fff2" stroke="#4ade80" stroke-width="4"/>
  <text x="3055" y="1175" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" fill="#166534">seed.py</text>
  <text x="3055" y="1225" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#15803d">Demo Data Loader</text>

  <!-- AI Layer -->
  <g filter="url(#shadow)">
    <rect x="2720" y="1650" width="670" height="560" rx="30" fill="#fff4c4" stroke="#b38b00" stroke-width="6"/>
  </g>
  <text x="3055" y="1740" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#713f12">AI Layer</text>

  <rect x="2810" y="1820" width="490" height="150" rx="20" fill="#fffdf0" stroke="#d4a602" stroke-width="4"/>
  <text x="3055" y="1900" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" fill="#854d0e">OpenAI API</text>

  <rect x="2810" y="2010" width="490" height="150" rx="20" fill="#fffdf0" stroke="#d4a602" stroke-width="4"/>
  <text x="3055" y="2090" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" fill="#854d0e">Mock Insight Fallback</text>

  <!-- Connectors -->
  <line x1="540" y1="1090" x2="680" y2="1090" stroke="#4b5563" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="1360" y1="1290" x2="1600" y2="1290" stroke="#4b5563" stroke-width="6" marker-end="url(#arrow)"/>

  <line x1="2500" y1="1050" x2="2720" y2="1050" stroke="#4b5563" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="2500" y1="1110" x2="2720" y2="1895" stroke="#4b5563" stroke-width="6" marker-end="url(#arrow)"/>

  <line x1="2100" y1="1180" x2="2100" y2="1240" stroke="#4b5563" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="2100" y1="1180" x2="2310" y2="1240" stroke="#4b5563" stroke-width="5" marker-end="url(#arrow)"/>

  <line x1="3055" y1="780" x2="3055" y2="850" stroke="#4b5563" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="3055" y1="1030" x2="3055" y2="1100" stroke="#4b5563" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- Flow labels -->
  <text x="1450" y="1245" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#374151">Bearer JWT API calls</text>
  <text x="2610" y="1015" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#374151">ORM queries</text>
  <text x="2620" y="1540" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#374151">AI insights</text>

  <!-- Footer -->
  <text x="1754" y="2390" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#475569">
    Generated for PowerPoint: A4 Landscape (3508 x 2480 px)
  </text>
</svg>
