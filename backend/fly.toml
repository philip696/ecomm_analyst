app = "marketlens-api"
primary_region = "sjc"

[build]
  builder = "paketobuildpacks/builder:base"
  buildpacks = ["gcr.io/paketo-buildpacks/python"]

[env]
  BP_PYTHON_VERSION = "3.13"
  PYTHONUNBUFFERED = "true"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  
  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80
  
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[deploy]
  strategy = "rolling"
  max_unavailable = 1

[metrics]
  port = 9090
  path = "/metrics"
